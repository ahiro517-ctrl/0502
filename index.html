<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1b1f3a" />
<title>ねこラン</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1b1f3a;
  }
  canvas {
    display: block;
    background: linear-gradient(#1b2a55 0%, #4a3a78 60%, #c66a8a 100%);
    touch-action: none;
    image-rendering: pixelated;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }
  #hud {
    position: absolute;
    top: env(safe-area-inset-top, 12px);
    left: 0; right: 0;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    font-weight: 700;
    font-size: 18px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    letter-spacing: 1px;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 12, 30, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: clamp(28px, 8vw, 48px);
    margin-bottom: 8px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.7);
  }
  #overlay p {
    font-size: clamp(14px, 3.6vw, 18px);
    margin-bottom: 24px;
    opacity: 0.9;
    line-height: 1.6;
  }
  #overlay button {
    font: inherit;
    font-weight: 700;
    font-size: clamp(16px, 4.2vw, 20px);
    padding: 14px 36px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #ffb84d, #ff5e87);
    color: #fff;
    box-shadow: 0 6px 20px rgba(255,94,135,0.5);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  #overlay button:active { transform: scale(0.96); }
  .small { font-size: clamp(12px, 3vw, 14px); opacity: 0.7; margin-top: 16px; }
  #charSelect {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .char-btn {
    background: rgba(255,255,255,0.08) !important;
    border: 2px solid rgba(255,255,255,0.2) !important;
    border-radius: 18px !important;
    padding: 12px 14px !important;
    font: inherit !important;
    color: #fff !important;
    cursor: pointer;
    box-shadow: none !important;
    display: flex !important;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 130px;
    transition: all 0.15s ease;
  }
  .char-btn.selected {
    border-color: #ffb84d !important;
    background: rgba(255,184,77,0.18) !important;
    box-shadow: 0 0 24px rgba(255,184,77,0.35) !important;
  }
  .char-btn canvas {
    width: 80px;
    height: 80px;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    box-shadow: none;
  }
  .char-name {
    font-weight: 700;
    font-size: clamp(14px, 3.6vw, 16px);
  }
  .char-desc {
    font-size: clamp(11px, 2.8vw, 13px);
    opacity: 0.75;
  }
  #fishCount {
    font-size: 18px;
  }
  #fishCount .icon {
    display: inline-block;
    width: 16px;
    height: 10px;
    background: #6cc4e6;
    border-radius: 50% 30% 30% 50% / 50% 60% 40% 50%;
    margin-right: 4px;
    vertical-align: middle;
    position: relative;
  }
  #hudLeft { display: flex; flex-direction: column; gap: 6px; }
  #lives { display: flex; gap: 4px; }
  .heart {
    width: 18px; height: 16px;
    position: relative;
    transform: rotate(-45deg);
    transition: opacity 0.2s, transform 0.2s;
  }
  .heart::before, .heart::after {
    content: ''; position: absolute;
    width: 12px; height: 12px;
    background: #ff5e87;
    border-radius: 50%;
  }
  .heart::before { top: -6px; left: 0; }
  .heart::after { left: 6px; top: 0; }
  .heart.lost { opacity: 0.25; }
  .heart.lost::before, .heart.lost::after { background: #555; }
  .heart.bump { transform: rotate(-45deg) scale(1.4); }
  #badgeToast {
    position: absolute;
    top: 90px; left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, rgba(255,184,77,0.95), rgba(255,94,135,0.95));
    color: #fff;
    padding: 12px 26px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    pointer-events: none;
    transition: opacity 0.4s, transform 0.4s;
    z-index: 5;
  }
  #badgeToast.hidden { opacity: 0; transform: translate(-50%, -10px); }
  #badgeToast .badge-label {
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.9;
  }
  #badgeToast .badge-name {
    font-size: 22px;
    font-weight: 800;
    margin-top: 2px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .titleList {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.5;
  }
  .titleList b { color: #ffd84d; }
  #hudCenter {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  #hudRight {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  #topBtns {
    display: flex;
    gap: 6px;
    pointer-events: auto;
  }
  .topBtn {
    width: 36px; height: 36px;
    border: none;
    border-radius: 10px;
    background: rgba(0,0,0,0.45);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
  }
  .topBtn.show { display: block; }
  #comboHud {
    font-weight: 800;
    font-size: 22px;
    color: #ffd84d;
    text-shadow: 0 2px 6px rgba(255,120,40,0.8), 0 0 14px rgba(255,200,80,0.6);
    letter-spacing: 1px;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
    line-height: 1;
  }
  #comboHud.show { opacity: 1; transform: scale(1); }
  #comboHud.bump { transform: scale(1.3); }
  #comboHud .x { font-size: 0.65em; opacity: 0.85; margin: 0 1px; }
  #comboHud .lab {
    font-size: 0.5em;
    letter-spacing: 3px;
    opacity: 0.9;
    margin-left: 4px;
  }
  #powerHud {
    position: absolute;
    top: 96px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
    z-index: 4;
  }
  .power-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.45);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
  }
  .power-bar .bar {
    width: 42px; height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    overflow: hidden;
  }
  .power-bar .fill { height: 100%; transition: width 0.1s linear; }
  .power-bar.matatabi .fill { background: linear-gradient(90deg, #c8ff80, #80ffc8); }
  .power-bar.magnet .fill { background: linear-gradient(90deg, #ffb84d, #ff5e87); }
  .stageBanner {
    position: absolute;
    top: 130px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 8px 22px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s;
    z-index: 5;
  }
  .stageBanner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="hudLeft">
      <div id="score">0 m</div>
      <div id="lives" aria-label="ライフ"></div>
    </div>
    <div id="hudCenter">
      <div id="fishCount"><span class="icon"></span><span id="fishNum">0</span></div>
      <div id="comboHud"><span id="comboNum">0</span><span class="x">×</span><span class="lab">COMBO</span></div>
    </div>
    <div id="hudRight">
      <div id="best">BEST 0 m</div>
      <div id="topBtns">
        <button id="muteBtn" class="topBtn" type="button" aria-label="サウンド切替">♪</button>
        <button id="pauseBtn" class="topBtn" type="button" aria-label="一時停止">❚❚</button>
      </div>
    </div>
  </div>
  <div id="powerHud"></div>
  <div id="stageBanner" class="stageBanner"></div>
  <div id="badgeToast" class="hidden">
    <div class="badge-label">称号獲得</div>
    <div class="badge-name"></div>
  </div>
  <div id="overlay">
    <h1>ねこラン</h1>
    <p id="overlayMsg">キャラを選んでスタート<br><span style="font-size:0.85em;opacity:0.8">タップでジャンプ・空中で再タップで二段ジャンプ<br>マタタビを取ると無敵に</span></p>
    <div id="charSelect">
      <button class="char-btn" data-char="black">
        <canvas class="char-preview" data-preview="black" width="80" height="80"></canvas>
        <div class="char-name">クロ</div>
        <div class="char-desc">大きな黒長毛</div>
      </button>
      <button class="char-btn" data-char="sabatora">
        <canvas class="char-preview" data-preview="sabatora" width="80" height="80"></canvas>
        <div class="char-name">サバ</div>
        <div class="char-desc">小さなサバトラ</div>
      </button>
    </div>
    <button id="startBtn">スタート</button>
    <div class="small">タップして開始</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const fishNumEl = document.getElementById('fishNum');

  // ---- キャラクター設定 ----
  const CHARACTERS = {
    black: {
      name: '黒長毛',
      w: 50, h: 64,
      body: '#1c1c26',
      shade: '#2c2c3a',
      belly: '#3a3a48',
      stripe: '#0a0a14',
      pawPad: '#5a3848',
      eye: '#ffd84d',
      pupil: '#1a1a0a',
      noseColor: '#4a2a3a',
      fluffy: true
    },
    sabatora: {
      name: 'サバトラ',
      w: 34, h: 48,
      body: '#a0a8b2',
      shade: '#7a8290',
      belly: '#e8ecf0',
      stripe: '#3a4452',
      pawPad: '#ffb8c8',
      eye: '#3a8a4a',
      pupil: '#1a1a2e',
      noseColor: '#ff7a8a',
      fluffy: false
    }
  };
  let selectedChar = localStorage.getItem('nekoRunChar') || 'sabatora';

  // ---- 仮想解像度（描画は固定 → CSSでフィット） ----
  const VW = 480;
  const VH = 800;
  canvas.width = VW;
  canvas.height = VH;

  function fit() {
    const ww = window.innerWidth;
    const wh = window.innerHeight;
    const scale = Math.min(ww / VW, wh / VH);
    canvas.style.width = (VW * scale) + 'px';
    canvas.style.height = (VH * scale) + 'px';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  fit();

  // ---- ゲーム状態 ----
  const GROUND_Y = VH - 120;
  const GRAVITY = 0.9;
  const JUMP_V = -15;
  const JUMP_HOLD_V = -0.55; // 長押し中の追加上昇
  const MAX_HOLD_FRAMES = 14;
  const BASE_SPEED = 5.5;

  let state = 'menu'; // menu | playing | dead
  let speed, distance, frame, holdFrames, jumping, jumpHold, jumpsLeft;
  let player, obstacles, fishes, matatabis, hearts, particles, clouds, mountains, ground;
  let invincibleFrames = 0;
  let damageFlashFrames = 0;
  let lives = 3;
  let fishRun = 0;
  let badgeToastFrames = 0;
  let bestDistance = +(localStorage.getItem('ninjaRunBest') || 0);
  let fishTotal = +(localStorage.getItem('nekoRunFishTotal') || 0);
  let earnedTitles = JSON.parse(localStorage.getItem('nekoRunTitles') || '[]');
  bestEl.textContent = 'BEST ' + Math.floor(bestDistance) + ' m';
  fishNumEl.textContent = fishTotal;

  // ---- 追加状態 (コンボ・パワーアップ・バイオーム・演出) ----
  let combo = 0, comboTimer = 0, comboMax = 0;
  const COMBO_DECAY = 180; // 3秒
  let magnetFrames = 0;
  let magnets = [], spikes = [];
  let spawnMagnetTimer = 1200;
  let shakeFrames = 0, shakeMag = 0;
  let stageIdx = 0, prevStageIdx = 0, stageBannerFrames = 0;
  let speedLines = [];

  // ---- バイオーム定義 ----
  const STAGES = [
    {
      name: '夕焼けの街',
      sky: ['#1b2a55', '#7a4a98', '#ff8a7a'],
      mountain: '#3b2a5a',
      mountainSnow: 'rgba(255,255,255,0.7)',
      ground: '#2a1a3a',
      groundLine: '#ff8a7a',
      moon: 'rgba(255, 240, 200, 0.95)',
      stars: 0,
      cloudColor: 'rgba(255,255,255,0.55)'
    },
    {
      name: '星降る夜',
      sky: ['#070b22', '#1a1e4a', '#3a2a5a'],
      mountain: '#1a1430',
      mountainSnow: 'rgba(180,200,255,0.75)',
      ground: '#0a0820',
      groundLine: '#80a0ff',
      moon: 'rgba(240, 250, 255, 0.95)',
      stars: 60,
      cloudColor: 'rgba(180,200,240,0.35)'
    },
    {
      name: '夜明け',
      sky: ['#2a103a', '#ff7a8a', '#ffd880'],
      mountain: '#5a2a4a',
      mountainSnow: 'rgba(255,240,200,0.8)',
      ground: '#3a1a2a',
      groundLine: '#ffe080',
      moon: 'rgba(255, 220, 180, 0.95)',
      stars: 0,
      cloudColor: 'rgba(255,220,200,0.6)'
    },
    {
      name: '草原の朝',
      sky: ['#80c8e8', '#c0e8f0', '#e0ffd0'],
      mountain: '#3a8a5a',
      mountainSnow: 'rgba(255,255,255,0.85)',
      ground: '#2a5a3a',
      groundLine: '#ffd84d',
      moon: 'rgba(255, 255, 230, 0.7)',
      stars: 0,
      cloudColor: 'rgba(255,255,255,0.85)'
    }
  ];
  let starField = [];
  function makeStarField(n) {
    const arr = [];
    for (let i = 0; i < n; i++) {
      arr.push({ x: Math.random() * VW, y: Math.random() * (GROUND_Y - 80), r: Math.random() * 1.5 + 0.4, tw: Math.random() * Math.PI * 2 });
    }
    return arr;
  }

  // ---- サウンド (WebAudio) ----
  let audioCtx = null;
  let muted = localStorage.getItem('nekoRunMuted') === '1';
  function ensureAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { audioCtx = null; }
  }
  function playTone(freq, duration, type, vol) {
    if (muted || !audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(vol || 0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    } catch (e) {}
  }
  function sfxJump(isDouble) {
    playTone(isDouble ? 920 : 660, 0.09, 'square', 0.07);
  }
  function sfxFish() {
    playTone(880 + Math.random() * 160, 0.07, 'sine', 0.09);
  }
  function sfxGoldFish() {
    playTone(1200, 0.08, 'sine', 0.1);
    setTimeout(() => playTone(1600, 0.1, 'sine', 0.1), 60);
    setTimeout(() => playTone(2000, 0.18, 'triangle', 0.08), 130);
  }
  function sfxDamage() {
    playTone(160, 0.18, 'sawtooth', 0.16);
    setTimeout(() => playTone(110, 0.22, 'sawtooth', 0.13), 80);
  }
  function sfxPower() {
    playTone(440, 0.08, 'triangle', 0.13);
    setTimeout(() => playTone(660, 0.08, 'triangle', 0.13), 60);
    setTimeout(() => playTone(880, 0.18, 'triangle', 0.12), 120);
  }
  function sfxHeart() {
    playTone(700, 0.08, 'sine', 0.12);
    setTimeout(() => playTone(1000, 0.12, 'sine', 0.1), 70);
  }
  function sfxBadge() {
    playTone(660, 0.1, 'square', 0.1);
    setTimeout(() => playTone(880, 0.1, 'square', 0.1), 80);
    setTimeout(() => playTone(1320, 0.22, 'triangle', 0.1), 160);
  }

  // ---- HUD 要素 ----
  const comboHudEl = document.getElementById('comboHud');
  const comboNumEl = document.getElementById('comboNum');
  const powerHudEl = document.getElementById('powerHud');
  const stageBannerEl = document.getElementById('stageBanner');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const topBtns = document.getElementById('topBtns');
  muteBtn.textContent = muted ? '×' : '♪';

  // 称号定義
  const TITLES = [
    { d: 1000,  name: '子猫見習い' },
    { d: 2000,  name: '街角の冒険者' },
    { d: 3000,  name: '屋根の旅人' },
    { d: 5000,  name: '月夜の影' },
    { d: 7000,  name: '風使いの猫' },
    { d: 10000, name: '伝説の野良' },
    { d: 15000, name: '夜空の守護神' },
    { d: 20000, name: 'ねこ神' }
  ];

  // ライフ HUD
  const livesEl = document.getElementById('lives');
  const badgeToastEl = document.getElementById('badgeToast');
  function renderLivesHud(bumpIdx) {
    livesEl.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const h = document.createElement('div');
      h.className = 'heart' + (i >= lives ? ' lost' : '');
      if (bumpIdx === i) h.classList.add('bump');
      livesEl.appendChild(h);
    }
    if (bumpIdx !== undefined) {
      setTimeout(() => {
        const hh = livesEl.children[bumpIdx];
        if (hh) hh.classList.remove('bump');
      }, 200);
    }
  }
  renderLivesHud();

  function showBadge(name) {
    badgeToastEl.querySelector('.badge-name').textContent = name;
    badgeToastEl.classList.remove('hidden');
    badgeToastFrames = 200;
  }
  function hideBadge() {
    badgeToastEl.classList.add('hidden');
  }

  function reset() {
    speed = BASE_SPEED;
    distance = 0;
    frame = 0;
    holdFrames = 0;
    jumping = false;
    jumpHold = false;
    jumpsLeft = 2;
    invincibleFrames = 0;
    damageFlashFrames = 0;
    lives = 3;
    fishRun = 0;
    combo = 0; comboTimer = 0; comboMax = 0;
    magnetFrames = 0;
    shakeFrames = 0; shakeMag = 0;
    speedLines = [];
    paused = false;
    stageIdx = 0; prevStageIdx = 0; stageBannerFrames = 0;
    starField = makeStarField(80);
    const c = CHARACTERS[selectedChar];
    player = {
      x: 90, y: GROUND_Y, w: c.w, h: c.h,
      vy: 0, onGround: true, runFrame: 0,
      char: selectedChar
    };
    obstacles = [];
    fishes = [];
    matatabis = [];
    magnets = [];
    spikes = [];
    hearts = [];
    particles = [];
    clouds = makeClouds();
    mountains = makeMountains();
    ground = [];
    spawnObstacleTimer = 90;
    spawnFishTimer = 60;
    spawnMatatabiTimer = 600;
    spawnHeartTimer = 900;
    spawnMagnetTimer = 1200;
    renderLivesHud();
    hideBadge();
    updatePowerHud();
    updateComboHud(true);
  }

  function makeClouds() {
    const arr = [];
    for (let i = 0; i < 5; i++) {
      arr.push({ x: Math.random() * VW, y: 60 + Math.random() * 140, r: 20 + Math.random() * 25 });
    }
    return arr;
  }
  function makeMountains() {
    const arr = [];
    for (let i = 0; i < 6; i++) {
      arr.push({ x: i * 120, y: GROUND_Y - 40, w: 180, h: 120 + Math.random() * 80 });
    }
    return arr;
  }

  let spawnObstacleTimer = 90;
  let spawnFishTimer = 60;
  let spawnMatatabiTimer = 600;
  let spawnHeartTimer = 900;

  function spawnObstacle() {
    const type = Math.random();
    // 距離が伸びるとトゲボールが解禁＆コンボ率↑
    const spikeUnlocked = distance > 600;
    if (type < 0.42) {
      // ヘビ (低い・地面)
      const w = 56 + Math.random() * 24;
      obstacles.push({ x: VW + 20, y: GROUND_Y, w, h: 18, kind: 'snake', t: Math.random() * Math.PI * 2 });
    } else if (type < 0.7) {
      // 鳥 (高い・空中)
      const altitude = 36 + Math.random() * 24; // 36..60
      obstacles.push({ x: VW + 20, y: GROUND_Y - altitude, w: 44, h: 36, kind: 'bird', t: 0 });
    } else if (spikeUnlocked && type < 0.85) {
      // 転がるトゲボール (低・速)
      spawnSpike();
    } else {
      // ヘビ + 鳥 コンボ (二段ジャンプで抜ける用)
      obstacles.push({ x: VW + 20, y: GROUND_Y, w: 60, h: 18, kind: 'snake', t: Math.random() * Math.PI * 2 });
      obstacles.push({ x: VW + 130, y: GROUND_Y - 50, w: 44, h: 36, kind: 'bird', t: 0 });
    }
  }
  function spawnFish() {
    const high = Math.random() < 0.5;
    // 高いほうはジャンプで取る、低いほうは走りながら取れる位置に
    const yBase = high ? GROUND_Y - 140 : GROUND_Y - 28;
    const count = 3 + Math.floor(Math.random() * 3);
    // 約8%の確率で1匹だけ金の魚に
    const goldIdx = Math.random() < 0.08 ? Math.floor(Math.random() * count) : -1;
    for (let i = 0; i < count; i++) {
      fishes.push({
        x: VW + 20 + i * 36, y: yBase, taken: false,
        t: Math.random() * Math.PI * 2,
        gold: i === goldIdx
      });
    }
  }
  function spawnMatatabi() {
    const y = GROUND_Y - 60 - Math.random() * 50;
    matatabis.push({ x: VW + 20, y, t: 0, taken: false });
  }
  function spawnHeart() {
    // ライフ満タンならスポーンしない
    if (lives >= 3) return;
    const y = GROUND_Y - 50 - Math.random() * 70;
    hearts.push({ x: VW + 20, y, t: 0, taken: false });
  }
  function spawnMagnet() {
    const y = GROUND_Y - 60 - Math.random() * 60;
    magnets.push({ x: VW + 20, y, t: 0, taken: false });
  }
  function spawnSpike() {
    // 転がるトゲボール (低い・速い)
    spikes.push({ x: VW + 20, y: GROUND_Y - 14, w: 28, h: 28, kind: 'spike', rot: 0 });
  }

  // ---- コンボ/パワーアップ HUD ----
  function updateComboHud(force) {
    if (combo >= 3) {
      comboNumEl.textContent = combo;

      comboHudEl.classList.remove('show');

  function bumpCombo() {

    setTimeout(() => comboHudEl.classList.remove('bump'), 130);

  function updatePowerHud() {
    const items = [];

  // 描画: 磁石アイテム
  function drawMagnets() {
    for (const m of magnets) {
      const bob = Math.sin(m.t) * 3;
      const cx = m.x, cy = m.y + bob;
      const auraR = 18 + Math.sin(m.t * 2) * 3;
      const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, auraR);
      grad.addColorStop(0, 'rgba(255,200,140,0.55)');
      grad.addColorStop(1, 'rgba(255,200,140,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, auraR, 0, Math.PI*2);
      ctx.fill();
      // U字磁石本体 (赤)
      ctx.fillStyle = '#e84048';
      ctx.beginPath();
      ctx.arc(cx, cy, 11, Math.PI, 0, false);
      ctx.lineTo(cx + 11, cy + 4);
      ctx.lineTo(cx + 5, cy + 4);
      ctx.arc(cx, cy, 5, 0, Math.PI, true);
      ctx.lineTo(cx - 11, cy + 4);
      ctx.closePath();
      ctx.fill();
      // 極の銀色部分
      ctx.fillStyle = '#e8e8f0';
      ctx.fillRect(cx - 11, cy + 1, 6, 5);
      ctx.fillRect(cx + 5, cy + 1, 6, 5);
      // N/S 文字
      ctx.fillStyle = '#1a1a2e';
      ctx.font = 'bold 5px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('N', cx - 8, cy + 5.5);
      ctx.fillText('S', cx + 8, cy + 5.5);
      ctx.textAlign = 'start';
      // キラキラ
      const sp = Math.abs(Math.sin(m.t * 2));
      ctx.fillStyle = `rgba(255, 240, 200, ${0.5 + 0.5 * sp})`;
      ctx.fillRect(cx - 16, cy - 12, 2, 2);
      ctx.fillRect(cx + 14, cy - 8, 2, 2);
      ctx.fillRect(cx + 4, cy - 18, 2, 2);
    }
  }

  // 描画: トゲボール
  function drawSpikes() {
    for (const s of spikes) {
      const cx = s.x + s.w / 2;
      const cy = s.y - s.h / 2;
      const r = s.w / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(s.rot);
      // 外側のトゲ (8本)
      ctx.fillStyle = '#3a2a30';
      ctx.beginPath();
      const spikeN = 10;
      for (let i = 0; i < spikeN; i++) {
        const a1 = (i / spikeN) * Math.PI * 2;
        const a2 = ((i + 0.5) / spikeN) * Math.PI * 2;
        const a3 = ((i + 1) / spikeN) * Math.PI * 2;
        if (i === 0) ctx.moveTo(Math.cos(a1) * r, Math.sin(a1) * r);
        ctx.lineTo(Math.cos(a2) * (r + 6), Math.sin(a2) * (r + 6));
        ctx.lineTo(Math.cos(a3) * r, Math.sin(a3) * r);
      }
      ctx.closePath();
      ctx.fill();
      // コア
      ctx.fillStyle = '#5a3a48';
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.75, 0, Math.PI * 2);
      ctx.fill();
      // ハイライト (鉄っぽさ)
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.arc(-r * 0.25, -r * 0.3, r * 0.35, 0, Math.PI * 2);
      ctx.fill();
      // 怒り目
      ctx.fillStyle = '#ffe070';
      ctx.fillRect(-5, -2, 3, 3);
      ctx.fillRect(2, -2, 3, 3);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(-4, -1, 1, 2);
      ctx.fillRect(3, -1, 1, 2);
      ctx.restore();
    }
  }

  // 描画: 疾走ライン
  function drawSpeedLines() {
    for (const sl of speedLines) {
      ctx.fillStyle = `rgba(255,255,255,${sl.life / 30 * 0.6})`;
      ctx.fillRect(sl.x, sl.y, sl.len, 2);
    }
  }

  // ---- 入力 ----
  function pressStart(e) {
    if (e) e.preventDefault();
    ensureAudio();
    if (state === 'paused') return; // ポーズ中は ▶ ボタンでのみ復帰
    if (state === 'menu' || state === 'dead') {
      startGame();
      return;
    }
    if (state === 'playing') {
      if (jumpsLeft > 0) {
        const isDouble = !player.onGround;
        player.vy = isDouble ? JUMP_V * 0.85 : JUMP_V;
        player.onGround = false;
        jumping = true;
        holdFrames = 0;
        jumpHold = true;
        jumpsLeft--;
        sfxJump(isDouble);
        // ジャンプ煙
        const cnt = isDouble ? 14 : 8;
        const color = isDouble ? '#ffe5a0' : '#ddd';
        for (let i = 0; i < cnt; i++) {
          particles.push({
            x: player.x + player.w/2,
            y: isDouble ? player.y - player.h/2 : player.y,
            vx: (Math.random() - 0.5) * (isDouble ? 4 : 2),
            vy: -Math.random() * (isDouble ? 3 : 2) + (isDouble ? 1 : 0),
            life: isDouble ? 24 : 20, color
          });
        }
      }
    }
  }
  function pressEnd(e) {
    if (e) e.preventDefault();
    jumpHold = false;
  }

  canvas.addEventListener('touchstart', pressStart, { passive: false });
  canvas.addEventListener('touchend', pressEnd, { passive: false });
  canvas.addEventListener('touchcancel', pressEnd, { passive: false });
  canvas.addEventListener('mousedown', pressStart);
  canvas.addEventListener('mouseup', pressEnd);
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      pressStart();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      pressEnd();
    }
  });

  startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    startGame();
  });

  // 一時停止ボタン
  function togglePause() {
    if (state === 'playing') {
      state = 'paused';
      pauseBtn.textContent = '▶';
    } else if (state === 'paused') {
      state = 'playing';
      pauseBtn.textContent = '❚❚';
    }
  }
  pauseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    togglePause();
  });

  // ミュートボタン
  function toggleMute() {
    muted = !muted;
    localStorage.setItem('nekoRunMuted', muted ? '1' : '0');
    muteBtn.textContent = muted ? '×' : '♪';
  }
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    toggleMute();
  });

  // P / Esc キーでポーズ
  window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyP' || e.code === 'Escape') {
      e.preventDefault();
      togglePause();
    }
    if (e.code === 'KeyM') { e.preventDefault(); toggleMute(); }
  });

  // キャラ選択
  const charButtons = document.querySelectorAll('.char-btn');
  function setSelectedChar(name) {
    selectedChar = name;
    localStorage.setItem('nekoRunChar', name);
    charButtons.forEach(b => {
      b.classList.toggle('selected', b.dataset.char === name);
    });
  }
  charButtons.forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      setSelectedChar(b.dataset.char);
    });
  });
  setSelectedChar(selectedChar);

  // キャラプレビュー描画
  function renderCharPreviews() {
    document.querySelectorAll('.char-preview').forEach(cv => {
      const pctx = cv.getContext('2d');
      const name = cv.dataset.preview;
      const cfg = CHARACTERS[name];
      pctx.clearRect(0, 0, cv.width, cv.height);
      // プレビュー用の固定地面位置 (尻尾分を考慮して右寄せ)
      const px = (cv.width - cfg.w) / 2 + 8;
      const py = cv.height - 10;
      // 影
      pctx.fillStyle = 'rgba(0,0,0,0.25)';
      pctx.beginPath();
      pctx.ellipse(cv.width/2, py + 3, cfg.w * 0.55, 4, 0, 0, Math.PI*2);
      pctx.fill();
      // 走るフレームでアニメさせる
      const fr = Math.floor((Date.now() / 120) % 4);
      drawCatPreview(pctx, px, py, cfg.w, cfg.h, fr, true, cfg, Date.now() / 50);
    });
  }
  // プレビュー専用 (GROUND_Yに依存しない drawCat 軽量版)
  function drawCatPreview(ctx, x, y, w, h, fr, onGround, cfg, frameN) {
    const baseW = 40, baseH = 56;
    const sx = w / baseW, sy = h / baseH;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(sx, sy);
    // 影なしで本体だけ描く: drawCatBody を共有したいので簡易にキャラ形状を再描画
    // → ctx は別 canvas なので、グローバル ctx と混同しないよう関数を独立に
    drawCatBody(ctx, baseW, baseH, fr, onGround, cfg, frameN);
    ctx.restore();
  }

  function startGame() {
    reset();
    state = 'playing';
    overlay.classList.add('hidden');
    pauseBtn.classList.add('show');
    muteBtn.classList.add('show');
    pauseBtn.textContent = '❚❚';
    showStageBanner(STAGES[0].name);
  }

  function gameOver() {
    state = 'dead';
    pauseBtn.classList.remove('show');
    muteBtn.classList.remove('show');
    comboHudEl.classList.remove('show');
    powerHudEl.innerHTML = '';
    hideStageBanner();
    if (distance > bestDistance) {
      bestDistance = distance;
      localStorage.setItem('ninjaRunBest', Math.floor(distance));
    }
    bestEl.textContent = 'BEST ' + Math.floor(bestDistance) + ' m';
    overlay.querySelector('h1').textContent = 'ゲームオーバー';

    // 獲得済みの称号一覧
    let titlesHtml = '';
    const owned = TITLES.filter(t => earnedTitles.includes(t.d));
    if (owned.length > 0) {
      titlesHtml = '<div class="titleList">' +
        '獲得称号: ' + owned.map(t => `<b>${t.name}</b>`).join(' / ') +
        '</div>';
    }
    overlayMsg.innerHTML =
      `スコア <b>${Math.floor(distance)} m</b> ・ ベスト <b>${Math.floor(bestDistance)} m</b><br>` +
      `この走行で <b>${fishRun}</b> 匹 / 累計 <b>${fishTotal}</b> 匹<br>` +
      `最大コンボ <b>${comboMax}×</b>` +
      titlesHtml;
    startBtn.textContent = 'コンティニュー';
    overlay.classList.remove('hidden');
  }

  // ---- 当たり判定 ----
  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y - a.h < b.y && a.y > b.y - b.h;
  }

  // ---- 更新 ----
  function update() {
    frame++;
    distance += speed * 0.1;
    speed = BASE_SPEED + Math.min(distance / 90, 6);

    // プレイヤー
    if (jumpHold && jumping && holdFrames < MAX_HOLD_FRAMES && player.vy < 0) {
      player.vy += JUMP_HOLD_V;
      holdFrames++;
    }
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.y >= GROUND_Y) {
      player.y = GROUND_Y;
      player.vy = 0;
      if (!player.onGround) {
        // 着地煙
        for (let i = 0; i < 6; i++) {
          particles.push({
            x: player.x + player.w/2 + (Math.random()-0.5)*20,
            y: GROUND_Y, vx: (Math.random()-0.5)*3, vy: -Math.random()*1.5,
            life: 18, color: '#cfcfcf'
          });
        }
      }
      player.onGround = true;
      jumping = false;
      jumpsLeft = 2;
    }
    if (invincibleFrames > 0) invincibleFrames--;
    player.runFrame = (player.runFrame + 0.3) % 4;

    // 走り煙
    if (player.onGround && frame % 6 === 0) {
      particles.push({
        x: player.x, y: GROUND_Y,
        vx: -1 - Math.random(), vy: -Math.random() * 0.8,
        life: 14, color: '#9ea3b8'
      });
    }

    // 障害物
    spawnObstacleTimer--;
    if (spawnObstacleTimer <= 0) {
      spawnObstacle();
      spawnObstacleTimer = 60 + Math.floor(Math.random() * 50) - Math.min(20, distance / 50);
      spawnObstacleTimer = Math.max(35, spawnObstacleTimer);
    }
    for (const o of obstacles) o.x -= speed;
    obstacles = obstacles.filter(o => o.x + o.w > -10);

    // 魚
    spawnFishTimer--;
    if (spawnFishTimer <= 0) {
      spawnFish();
      spawnFishTimer = 90 + Math.floor(Math.random() * 80);
    }
    for (const f of fishes) {
      f.x -= speed;
      f.t += 0.2;
    }
    fishes = fishes.filter(f => f.x > -30 && !f.taken);

    // マグネット効果: 魚を引き寄せる
    if (magnetFrames > 0) {
      const px = player.x + player.w/2;
      const py = player.y - player.h/2;
      for (const f of fishes) {
        if (f.taken) continue;
        const dx = px - f.x;
        const dy = py - f.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 220 * 220) {
          const d = Math.sqrt(d2) || 1;
          const pull = 7;
          f.x += (dx / d) * pull;
          f.y += (dy / d) * pull;
        }
      }
    }

    // 魚取得
    for (const f of fishes) {
      if (f.taken) continue;
      const dx = (player.x + player.w/2) - f.x;
      const dy = (player.y - player.h/2) - f.y;
      const grabR = Math.max(player.w, player.h) * 0.55;
      if (dx*dx + dy*dy < grabR * grabR) {
        f.taken = true;
        const value = f.gold ? 10 : 1;
        // コンボ
        combo++;
        comboTimer = COMBO_DECAY;
        if (combo > comboMax) comboMax = combo;
        const mult = 1 + Math.floor(combo / 5); // 5匹ごとに+1倍
        fishRun += value * mult;
        fishTotal += value * mult;
        localStorage.setItem('nekoRunFishTotal', fishTotal);
        fishNumEl.textContent = fishTotal;
        distance += 5 * mult * (f.gold ? 3 : 1);
        if (combo >= 3) bumpCombo();
        updateComboHud();
        if (f.gold) {
          sfxGoldFish();
          // 金パーティクル多め
          for (let i = 0; i < 28; i++) {
            particles.push({
              x: f.x, y: f.y,
              vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7 - 1,
              life: 36, color: i % 2 ? '#ffd84d' : '#fff5a0'
            });
          }
          // コンボ＋3おまけ
          combo += 2;
          updateComboHud();
        } else {
          sfxFish();
          for (let i = 0; i < 10; i++) {
            particles.push({
              x: f.x, y: f.y,
              vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
              life: 22, color: '#6cc4e6'
            });
          }
        }
      }
    }

    // 障害物アニメ
    for (const o of obstacles) {
      if (o.kind === 'snake' || o.kind === 'bird') o.t += 0.2;
    }

    // マタタビ
    spawnMatatabiTimer--;
    if (spawnMatatabiTimer <= 0) {
      spawnMatatabi();
      spawnMatatabiTimer = 600 + Math.floor(Math.random() * 600); // 10〜20秒
    }
    for (const m of matatabis) {
      m.x -= speed;
      m.t += 0.15;
    }
    matatabis = matatabis.filter(m => m.x > -30 && !m.taken);
    for (const m of matatabis) {
      const dx = (player.x + player.w/2) - m.x;
      const dy = (player.y - player.h/2) - m.y;
      const grabR = Math.max(player.w, player.h) * 0.6;
      if (dx*dx + dy*dy < grabR * grabR) {
        m.taken = true;
        invincibleFrames = 60 * 5;
        sfxPower();
        for (let i = 0; i < 24; i++) {
          particles.push({
            x: m.x, y: m.y,
            vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5 - 1,
            life: 30, color: '#a8e060'
          });
        }
      }
    }

    // マグネットアイテム
    spawnMagnetTimer--;
    if (spawnMagnetTimer <= 0) {
      spawnMagnet();
      spawnMagnetTimer = 900 + Math.floor(Math.random() * 900); // 15〜30秒
    }
    for (const m of magnets) { m.x -= speed; m.t += 0.18; }
    magnets = magnets.filter(m => m.x > -30 && !m.taken);
    for (const m of magnets) {
      const dx = (player.x + player.w/2) - m.x;
      const dy = (player.y - player.h/2) - m.y;
      const grabR = Math.max(player.w, player.h) * 0.6;
      if (dx*dx + dy*dy < grabR * grabR) {
        m.taken = true;
        magnetFrames = 60 * 6; // 6秒
        sfxPower();
        for (let i = 0; i < 24; i++) {
          particles.push({
            x: m.x, y: m.y,
            vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5 - 1,
            life: 30, color: i % 2 ? '#ff8a4d' : '#ffd070'
          });
        }
      }
    }
    if (magnetFrames > 0) magnetFrames--;

    // トゲボール: 転がりながら左に移動
    for (const s of spikes) {
      s.x -= speed * 1.15; // やや速い
      s.rot -= speed * 0.06;
    }
    spikes = spikes.filter(s => s.x + s.w > -10);

    // コンボ減衰
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer === 0 && combo > 0) {
        combo = 0;
        updateComboHud(true);
      }
    }

    // ハート
    spawnHeartTimer--;
    if (spawnHeartTimer <= 0) {
      spawnHeart();
      spawnHeartTimer = 900 + Math.floor(Math.random() * 600); // 15〜25秒
    }
    for (const h of hearts) {
      h.x -= speed;
      h.t += 0.15;
    }
    hearts = hearts.filter(h => h.x > -30 && !h.taken);
    for (const h of hearts) {
      const dx = (player.x + player.w/2) - h.x;
      const dy = (player.y - player.h/2) - h.y;
      const grabR = Math.max(player.w, player.h) * 0.6;
      if (dx*dx + dy*dy < grabR * grabR) {
        h.taken = true;
        if (lives < 3) {
          lives++;
          renderLivesHud(lives - 1);
        }
        sfxHeart();
        for (let i = 0; i < 18; i++) {
          particles.push({
            x: h.x, y: h.y,
            vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1,
            life: 26, color: '#ff8aa8'
          });
        }
      }
    }

    // ダメージ点滅 / 一時無敵カウンタ
    if (damageFlashFrames > 0) damageFlashFrames--;

    // 当たり判定 (無敵中・ダメージ無敵中はスキップ)
    if (invincibleFrames <= 0 && damageFlashFrames <= 0) {
      const pBox = { x: player.x + 6, y: player.y - 4, w: player.w - 12, h: player.h - 8 };
      let hit = null;
      for (const o of obstacles) {
        if (aabb(pBox, o)) { hit = o; break; }
      }
      if (!hit) {
        for (const s of spikes) {
          if (aabb(pBox, s)) { hit = s; break; }
        }
      }
      if (hit) {
        lives--;
        damageFlashFrames = 60; // 1秒間無敵 + 点滅
        combo = 0;
        updateComboHud(true);
        shakeFrames = 18;
        shakeMag = 8;
        sfxDamage();
        renderLivesHud(lives);
        for (let i = 0; i < 22; i++) {
          particles.push({
            x: player.x + player.w/2,
            y: player.y - player.h/2,
            vx: (Math.random()-0.5)*6,
            vy: (Math.random()-0.5)*6 - 2,
            life: 28, color: '#ff5e87'
          });
        }
        if (lives <= 0) {
          gameOver();
          return;
        }
      }
    }

    // 称号 / マイルストーン (1000mごと)
    const prevDist = distance - speed * 0.1;
    const currMile = Math.floor(distance / 1000);
    const prevMile = Math.floor(prevDist / 1000);
    if (currMile > prevMile && currMile > 0) {
      const target = currMile * 1000;
      const titled = TITLES.find(t => t.d === target);
      if (titled) {
        if (!earnedTitles.includes(titled.d)) {
          earnedTitles.push(titled.d);
          localStorage.setItem('nekoRunTitles', JSON.stringify(earnedTitles));
        }
        showBadge('称号: ' + titled.name);
      } else {
        showBadge(target + ' m 走破！');
      }
      sfxBadge();
    }
    if (badgeToastFrames > 0) {
      badgeToastFrames--;
      if (badgeToastFrames === 0) hideBadge();
    }

    // バイオーム (1500mごとに切替)
    stageIdx = Math.floor(distance / 1500) % STAGES.length;
    if (stageIdx !== prevStageIdx) {
      prevStageIdx = stageIdx;
      showStageBanner(STAGES[stageIdx].name);
      // 星空への切替時は星を再生成
      if (STAGES[stageIdx].stars > 0) starField = makeStarField(STAGES[stageIdx].stars);
    }
    if (stageBannerFrames > 0) {
      stageBannerFrames--;
      if (stageBannerFrames === 0) hideStageBanner();
    }

    // 疾走ライン (高速時)
    if (speed > 7.5 && frame % 3 === 0) {
      speedLines.push({
        x: VW + 20,
        y: 60 + Math.random() * (GROUND_Y - 80),
        len: 20 + Math.random() * 30,
        life: 24
      });
    }
    for (const sl of speedLines) {
      sl.x -= speed * 2.5;
      sl.life--;
    }
    speedLines = speedLines.filter(sl => sl.life > 0 && sl.x + sl.len > -10);

    // 画面シェイク
    if (shakeFrames > 0) shakeFrames--;

    // HUD パワーアップ表示更新 (毎フレームではなく軽く)
    if (frame % 6 === 0) updatePowerHud();

    // 背景
    for (const cl of clouds) {
      cl.x -= speed * 0.15;
      if (cl.x < -40) { cl.x = VW + 40; cl.y = 60 + Math.random() * 140; cl.r = 20 + Math.random() * 25; }
    }
    for (const m of mountains) {
      m.x -= speed * 0.4;
      if (m.x + m.w < 0) { m.x += mountains.length * 120; m.h = 120 + Math.random() * 80; }
    }

    // パーティクル
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);

    scoreEl.textContent = Math.floor(distance) + ' m';
  }

  // ---- 描画 ----
  function drawBackground() {
    const stage = STAGES[stageIdx];
    // 空グラデは canvas 背景任せ → 透明で消す
    ctx.clearRect(0, 0, VW, VH);
    const g = ctx.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, stage.sky[0]);
    g.addColorStop(0.55, stage.sky[1]);
    g.addColorStop(1, stage.sky[2]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW, VH);

    // 星 (夜のみ)
    if (stage.stars > 0) {
      for (const s of starField) {
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(frame * 0.05 + s.tw));
        ctx.fillStyle = `rgba(255,255,240,${tw})`;
        ctx.fillRect(s.x, s.y, s.r, s.r);
      }
    }

    // 月
    ctx.fillStyle = stage.moon;
    ctx.beginPath();
    ctx.arc(VW - 90, 110, 38, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(120, 90, 140, 0.45)';
    ctx.beginPath();
    ctx.arc(VW - 78, 100, 32, 0, Math.PI * 2);
    ctx.fill();

    // 雲
    ctx.fillStyle = stage.cloudColor;
    for (const c of clouds) {
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
      ctx.arc(c.x + c.r*0.7, c.y + 4, c.r * 0.8, 0, Math.PI*2);
      ctx.arc(c.x - c.r*0.7, c.y + 6, c.r * 0.7, 0, Math.PI*2);
      ctx.fill();
    }

    // 山
    for (const m of mountains) {
      ctx.fillStyle = stage.mountain;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x + m.w/2, m.y - m.h);
      ctx.lineTo(m.x + m.w, m.y);
      ctx.closePath();
      ctx.fill();
      // 雪
      ctx.fillStyle = stage.mountainSnow;
      ctx.beginPath();
      ctx.moveTo(m.x + m.w/2 - 18, m.y - m.h + 30);
      ctx.lineTo(m.x + m.w/2, m.y - m.h);
      ctx.lineTo(m.x + m.w/2 + 18, m.y - m.h + 30);
      ctx.lineTo(m.x + m.w/2 + 6, m.y - m.h + 28);
      ctx.lineTo(m.x + m.w/2, m.y - m.h + 18);
      ctx.lineTo(m.x + m.w/2 - 6, m.y - m.h + 28);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawGround() {
    const stage = STAGES[stageIdx];
    // 地面
    ctx.fillStyle = stage.ground;
    ctx.fillRect(0, GROUND_Y, VW, VH - GROUND_Y);
    // ハイライト線
    ctx.fillStyle = stage.groundLine;
    ctx.fillRect(0, GROUND_Y, VW, 3);
    // スクロール模様
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    const off = (frame * speed) % 40;
    for (let x = -off; x < VW; x += 40) {
      ctx.fillRect(x, GROUND_Y + 30, 20, 3);
      ctx.fillRect(x + 10, GROUND_Y + 60, 14, 3);
    }
  }

  function drawPlayer() {
    if (invincibleFrames > 0) {
      const auraT = frame * 0.15;
      const auraR = Math.max(player.w, player.h) * 0.7 + Math.sin(auraT) * 4;
      const grad = ctx.createRadialGradient(
        player.x + player.w/2, player.y - player.h/2, 4,
        player.x + player.w/2, player.y - player.h/2, auraR
      );
      grad.addColorStop(0, 'rgba(220,255,160,0.55)');
      grad.addColorStop(1, 'rgba(220,255,160,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(player.x + player.w/2, player.y - player.h/2, auraR, 0, Math.PI*2);
      ctx.fill();
      const flashSpeed = invincibleFrames < 60 ? 3 : 5;
      const phase = Math.floor(frame / flashSpeed) % 2;
      ctx.globalAlpha = phase === 0 ? 1 : 0.35;
    } else if (damageFlashFrames > 0) {
      // ダメージ点滅 (赤っぽく速い点滅)
      const phase = Math.floor(frame / 3) % 2;
      ctx.globalAlpha = phase === 0 ? 1 : 0.25;
    }
    drawCat(ctx, player.x, player.y, player.w, player.h,
      Math.floor(player.runFrame), player.onGround, CHARACTERS[player.char], frame, true);
    ctx.globalAlpha = 1;
    if (damageFlashFrames > 0) {
      // 赤いハートマーク (痛い演出)
      const hp = damageFlashFrames / 60;
      ctx.fillStyle = `rgba(255, 80, 100, ${hp * 0.8})`;
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('!', player.x + player.w + 6, player.y - player.h + 4);
    }
  }

  // 共通の猫描画 (プレビューでも使う)
  function drawCat(ctx, x, y, w, h, fr, onGround, cfg, frameN, drawShadow) {
    // 影
    if (onGround && drawShadow) {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(x + w/2, GROUND_Y + 4, w * 0.55, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }

    const baseW = 40, baseH = 56;
    const sx = w / baseW, sy = h / baseH;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(sx, sy);
    drawCatBody(ctx, baseW, baseH, fr, onGround, cfg, frameN);
    ctx.restore();
  }

  function drawCatBody(ctx, baseW, baseH, fr, onGround, cfg, frameN) {
    const H = baseH;

    // 尻尾 (背後でゆらゆら)
    const tailWave = Math.sin(frameN * 0.25) * 6;
    ctx.strokeStyle = cfg.body;
    ctx.lineWidth = cfg.fluffy ? 10 : 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(2, -H + 32);
    ctx.quadraticCurveTo(-12, -H + 22 + tailWave, -14, -H + 4 + tailWave);
    ctx.stroke();
    if (cfg.fluffy) {
      // 長毛のふさふさ
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.arc(-14, -H + 4 + tailWave, 7, 0, Math.PI*2);
      ctx.arc(-10, -H + 14 + tailWave * 0.7, 5, 0, Math.PI*2);
      ctx.fill();
    }

    // 後足
    ctx.fillStyle = cfg.body;
    if (onGround) {
      const legA = (fr === 0 || fr === 2) ? 0 : 6;
      const legB = (fr === 0 || fr === 2) ? 6 : 0;
      ctx.fillRect(8, -10, 9, 10 + legA);
      ctx.fillRect(23, -10, 9, 10 + legB);
      ctx.fillStyle = cfg.pawPad;
      ctx.fillRect(9, -1 + legA, 7, 2);
      ctx.fillRect(24, -1 + legB, 7, 2);
    } else {
      ctx.fillRect(6, -16, 9, 10);
      ctx.fillRect(25, -16, 9, 10);
      ctx.fillStyle = cfg.pawPad;
      ctx.fillRect(7, -8, 7, 2);
      ctx.fillRect(26, -8, 7, 2);
    }

    // 胴体
    ctx.fillStyle = cfg.body;
    ctx.beginPath();
    ctx.ellipse(baseW/2, -H/2 + 8, baseW/2 - 4, H/2 - 8, 0, 0, Math.PI*2);
    ctx.fill();

    if (cfg.fluffy) {
      // ふわふわの毛束
      ctx.fillStyle = cfg.shade;
      ctx.beginPath();
      ctx.arc(4, -H/2, 5, 0, Math.PI*2);
      ctx.arc(baseW - 4, -H/2, 5, 0, Math.PI*2);
      ctx.arc(8, -H + 24, 5, 0, Math.PI*2);
      ctx.arc(baseW - 8, -H + 24, 5, 0, Math.PI*2);
      ctx.fill();
    }

    // お腹
    ctx.fillStyle = cfg.belly;
    ctx.beginPath();
    ctx.ellipse(baseW/2, -H/2 + 14, baseW/2 - 11, H/2 - 14, 0, 0, Math.PI*2);
    ctx.fill();

    // 縞模様 (サバトラは多め、黒猫はうっすら)
    ctx.fillStyle = cfg.stripe;
    if (cfg.fluffy) {
      ctx.globalAlpha = 0.5;
    }
    ctx.fillRect(7, -H + 26, 5, 3);
    ctx.fillRect(7, -H + 34, 5, 3);
    ctx.fillRect(baseW - 12, -H + 26, 5, 3);
    ctx.fillRect(baseW - 12, -H + 34, 5, 3);
    if (!cfg.fluffy) {
      ctx.fillRect(7, -H + 30, 5, 2);
      ctx.fillRect(baseW - 12, -H + 30, 5, 2);
    }
    ctx.globalAlpha = 1;

    // 前足
    ctx.fillStyle = cfg.body;
    if (onGround) {
      const armSwing = (fr === 0 || fr === 2) ? -2 : 3;
      ctx.fillRect(2, -H + 28, 7, 14 + armSwing);
      ctx.fillRect(baseW - 9, -H + 28, 7, 14 - armSwing);
      ctx.fillStyle = cfg.pawPad;
      ctx.fillRect(2, -H + 41 + armSwing, 7, 2);
      ctx.fillRect(baseW - 9, -H + 41 - armSwing, 7, 2);
    } else {
      ctx.fillRect(0, -H + 26, 7, 12);
      ctx.fillRect(baseW - 7, -H + 26, 7, 12);
    }

    // 頭
    ctx.fillStyle = cfg.body;
    ctx.beginPath();
    ctx.ellipse(baseW/2, -H + 12, 16, 13, 0, 0, Math.PI*2);
    ctx.fill();

    if (cfg.fluffy) {
      // 顔まわりの毛
      ctx.fillStyle = cfg.shade;
      ctx.beginPath();
      ctx.arc(5, -H + 14, 4, 0, Math.PI*2);
      ctx.arc(baseW - 5, -H + 14, 4, 0, Math.PI*2);
      ctx.arc(10, -H + 22, 3, 0, Math.PI*2);
      ctx.arc(baseW - 10, -H + 22, 3, 0, Math.PI*2);
      ctx.fill();
    }

    // 耳
    ctx.fillStyle = cfg.body;
    ctx.beginPath();
    ctx.moveTo(8, -H + 6);
    ctx.lineTo(13, -H - 7);
    ctx.lineTo(20, -H + 2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(20, -H + 2);
    ctx.lineTo(27, -H - 7);
    ctx.lineTo(32, -H + 6);
    ctx.closePath();
    ctx.fill();
    // 耳の中
    ctx.fillStyle = '#ffb8c8';
    ctx.beginPath();
    ctx.moveTo(11, -H + 4);
    ctx.lineTo(14, -H - 3);
    ctx.lineTo(17, -H + 2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(23, -H + 2);
    ctx.lineTo(26, -H - 3);
    ctx.lineTo(29, -H + 4);
    ctx.closePath();
    ctx.fill();

    // ほっぺ
    ctx.fillStyle = 'rgba(255, 150, 170, 0.4)';
    ctx.beginPath();
    ctx.arc(8, -H + 16, 3, 0, Math.PI*2);
    ctx.arc(32, -H + 16, 3, 0, Math.PI*2);
    ctx.fill();

    // 目 (白)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(14, -H + 12, 3.5, 0, Math.PI*2);
    ctx.arc(26, -H + 12, 3.5, 0, Math.PI*2);
    ctx.fill();
    // 虹彩
    ctx.fillStyle = cfg.eye;
    ctx.beginPath();
    ctx.arc(14, -H + 12, 2.4, 0, Math.PI*2);
    ctx.arc(26, -H + 12, 2.4, 0, Math.PI*2);
    ctx.fill();
    // 瞳孔
    ctx.fillStyle = cfg.pupil;
    ctx.fillRect(13.5, -H + 10, 1, 4);
    ctx.fillRect(25.5, -H + 10, 1, 4);
    // ハイライト
    ctx.fillStyle = '#fff';
    ctx.fillRect(15, -H + 11, 1, 1);
    ctx.fillRect(27, -H + 11, 1, 1);

    // 鼻
    ctx.fillStyle = cfg.noseColor;
    ctx.beginPath();
    ctx.moveTo(18, -H + 17);
    ctx.lineTo(22, -H + 17);
    ctx.lineTo(20, -H + 19);
    ctx.closePath();
    ctx.fill();

    // 口
    ctx.strokeStyle = cfg.fluffy ? '#000' : '#1a1a2e';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(20, -H + 19);
    ctx.lineTo(20, -H + 21);
    ctx.moveTo(20, -H + 21);
    ctx.quadraticCurveTo(17, -H + 23, 15, -H + 21);
    ctx.moveTo(20, -H + 21);
    ctx.quadraticCurveTo(23, -H + 23, 25, -H + 21);
    ctx.stroke();

    // ひげ
    ctx.strokeStyle = cfg.fluffy ? 'rgba(255,255,255,0.7)' : 'rgba(60,60,80,0.85)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(10, -H + 17);
    ctx.lineTo(2, -H + 16);
    ctx.moveTo(10, -H + 19);
    ctx.lineTo(2, -H + 21);
    ctx.moveTo(30, -H + 17);
    ctx.lineTo(38, -H + 16);
    ctx.moveTo(30, -H + 19);
    ctx.lineTo(38, -H + 21);
    ctx.stroke();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      if (o.kind === 'snake') {
        // ヘビ: 蛇行する胴体 + 頭 (左向き)
        const bodyY = o.y - o.h / 2;
        const wave = o.t || 0;
        const cw = o.w;
        // 胴体 (上下にうねる帯)
        ctx.fillStyle = '#4a8a3a';
        ctx.beginPath();
        const seg = 8;
        const top = [];
        const bot = [];
        for (let i = 0; i <= cw; i += seg) {
          const yy = bodyY + Math.sin(i * 0.18 + wave) * 4;
          top.push([o.x + i, yy - o.h * 0.45]);
          bot.push([o.x + i, yy + o.h * 0.45]);
        }
        ctx.moveTo(top[0][0], top[0][1]);
        for (const p of top) ctx.lineTo(p[0], p[1]);
        for (let i = bot.length - 1; i >= 0; i--) ctx.lineTo(bot[i][0], bot[i][1]);
        ctx.closePath();
        ctx.fill();
        // 縞模様
        ctx.fillStyle = '#2a6a1a';
        for (let i = 4; i < cw - 6; i += 12) {
          const yy = bodyY + Math.sin(i * 0.18 + wave) * 4;
          ctx.fillRect(o.x + i, yy - o.h * 0.3, 3, o.h * 0.6);
        }
        // 頭 (左端)
        const headY = bodyY + Math.sin(wave) * 4;
        ctx.fillStyle = '#5aaa4a';
        ctx.beginPath();
        ctx.ellipse(o.x + 4, headY, 8, o.h * 0.55, 0, 0, Math.PI*2);
        ctx.fill();
        // 目
        ctx.fillStyle = '#ffd84d';
        ctx.fillRect(o.x + 2, headY - 4, 3, 3);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(o.x + 3, headY - 3, 1, 2);
        // 舌
        const tongueLen = (Math.floor(wave * 2) % 4 < 2) ? 8 : 4;
        ctx.fillStyle = '#ff5e87';
        ctx.fillRect(o.x - tongueLen, headY, tongueLen, 1.5);
        ctx.fillRect(o.x - tongueLen - 2, headY - 1, 2, 1.5);
        ctx.fillRect(o.x - tongueLen - 2, headY + 1, 2, 1.5);
      } else if (o.kind === 'bird') {
        // 鳥: 体 + 羽ばたく翼 + くちばし
        const wing = Math.sin(o.t * 1.6) * 8;
        const cx = o.x + o.w / 2;
        const cy = o.y - o.h / 2;
        // 翼 (奥)
        ctx.fillStyle = '#2c2c3a';
        ctx.beginPath();
        ctx.moveTo(cx - 4, cy);
        ctx.lineTo(cx - 18, cy - wing);
        ctx.lineTo(cx - 8, cy + 2);
        ctx.closePath();
        ctx.fill();
        // 体
        ctx.fillStyle = '#4a4a5a';
        ctx.beginPath();
        ctx.ellipse(cx, cy, o.w/2 - 2, o.h/3, 0, 0, Math.PI*2);
        ctx.fill();
        // お腹
        ctx.fillStyle = '#7a7a8a';
        ctx.beginPath();
        ctx.ellipse(cx, cy + 2, o.w/2 - 6, o.h/4, 0, 0, Math.PI*2);
        ctx.fill();
        // 翼 (手前)
        ctx.fillStyle = '#3a3a4a';
        ctx.beginPath();
        ctx.moveTo(cx + 2, cy);
        ctx.lineTo(cx + 14, cy - wing - 2);
        ctx.lineTo(cx + 6, cy + 4);
        ctx.closePath();
        ctx.fill();
        // 尾羽 (右)
        ctx.fillStyle = '#3a3a4a';
        ctx.beginPath();
        ctx.moveTo(cx + o.w/2 - 4, cy);
        ctx.lineTo(cx + o.w/2 + 4, cy - 4);
        ctx.lineTo(cx + o.w/2 + 4, cy + 4);
        ctx.closePath();
        ctx.fill();
        // くちばし (左 = 進行方向)
        ctx.fillStyle = '#ffaa3a';
        ctx.beginPath();
        ctx.moveTo(cx - o.w/2 + 2, cy);
        ctx.lineTo(cx - o.w/2 - 6, cy - 2);
        ctx.lineTo(cx - o.w/2 - 6, cy + 2);
        ctx.closePath();
        ctx.fill();
        // 目
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx - o.w/2 + 8, cy - 2, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(cx - o.w/2 + 7, cy - 2, 1.4, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawFish() {
    for (const f of fishes) {
      const bob = Math.sin(f.t) * 2;
      const cx = f.x, cy = f.y + bob;
      const gold = f.gold;
      const bodyColor = gold ? '#ffd84d' : '#6cc4e6';
      const bellyColor = gold ? '#fff5b0' : '#cfeaf3';
      const finColor = gold ? '#d09020' : '#4a9ec0';
      // 金の魚はオーラ
      if (gold) {
        const auraR = 22 + Math.sin(f.t * 2) * 3;
        const grad = ctx.createRadialGradient(cx, cy, 4, cx, cy, auraR);
        grad.addColorStop(0, 'rgba(255,230,140,0.65)');
        grad.addColorStop(1, 'rgba(255,230,140,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, auraR, 0, Math.PI*2);
        ctx.fill();
      }
      // 体
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 14, 8, 0, 0, Math.PI*2);
      ctx.fill();
      // お腹 (薄)
      ctx.fillStyle = bellyColor;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, 11, 5, 0, 0, Math.PI*2);
      ctx.fill();
      // 尾びれ
      ctx.fillStyle = finColor;
      ctx.beginPath();
      ctx.moveTo(cx + 12, cy);
      ctx.lineTo(cx + 22, cy - 6);
      ctx.lineTo(cx + 19, cy);
      ctx.lineTo(cx + 22, cy + 6);
      ctx.closePath();
      ctx.fill();
      // 背びれ
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy - 7);
      ctx.lineTo(cx + 4, cy - 12);
      ctx.lineTo(cx + 6, cy - 7);
      ctx.closePath();
      ctx.fill();
      // エラ
      ctx.strokeStyle = finColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx - 6, cy, 4, -Math.PI/2, Math.PI/2);
      ctx.stroke();
      // 目
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx - 8, cy - 1, 2.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(cx - 8.5, cy - 1, 1.2, 0, Math.PI*2);
      ctx.fill();
      // 金の魚: キラッと
      if (gold) {
        const sp = Math.abs(Math.sin(f.t * 3));
        ctx.fillStyle = `rgba(255,255,220,${0.4 + 0.6 * sp})`;
        ctx.fillRect(cx + 4, cy - 4, 2, 2);
        ctx.fillRect(cx - 2, cy + 3, 2, 2);
      }
    }
  }

  function drawHeartShape(ctx, cx, cy, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx, cy + r * 0.6);
    ctx.bezierCurveTo(cx - r * 1.2, cy - r * 0.2, cx - r * 0.4, cy - r * 1.2, cx, cy - r * 0.4);
    ctx.bezierCurveTo(cx + r * 0.4, cy - r * 1.2, cx + r * 1.2, cy - r * 0.2, cx, cy + r * 0.6);
    ctx.fill();
  }

  function drawHearts() {
    for (const h of hearts) {
      const bob = Math.sin(h.t) * 3;
      const cx = h.x, cy = h.y + bob;
      // ピンクのオーラ
      const auraR = 16 + Math.sin(h.t * 2) * 2;
      const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, auraR);
      grad.addColorStop(0, 'rgba(255,180,200,0.55)');
      grad.addColorStop(1, 'rgba(255,180,200,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, auraR, 0, Math.PI*2);
      ctx.fill();
      // 影
      drawHeartShape(ctx, cx, cy + 1, 11, '#c83864');
      // 本体
      drawHeartShape(ctx, cx, cy, 11, '#ff5e87');
      // ハイライト
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.ellipse(cx - 3, cy - 4, 2, 3, -0.3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawMatatabis() {
    for (const m of matatabis) {
      const bob = Math.sin(m.t) * 3;
      const cx = m.x, cy = m.y + bob;
      // 光のオーラ
      const auraR = 18 + Math.sin(m.t * 2) * 3;
      const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, auraR);
      grad.addColorStop(0, 'rgba(220,255,160,0.6)');
      grad.addColorStop(1, 'rgba(220,255,160,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, auraR, 0, Math.PI*2);
      ctx.fill();
      // 茎
      ctx.strokeStyle = '#5a8a3a';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy + 8);
      ctx.lineTo(cx, cy - 4);
      ctx.stroke();
      // 葉 (3枚)
      ctx.fillStyle = '#5aa840';
      ctx.beginPath();
      ctx.ellipse(cx - 8, cy - 1, 9, 5, -0.4, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + 8, cy - 1, 9, 5, 0.4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#7ac460';
      ctx.beginPath();
      ctx.ellipse(cx, cy - 8, 7, 6, 0, 0, Math.PI*2);
      ctx.fill();
      // 葉脈
      ctx.strokeStyle = '#3a7028';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(cx - 14, cy - 2); ctx.lineTo(cx - 2, cy);
      ctx.moveTo(cx + 14, cy - 2); ctx.lineTo(cx + 2, cy);
      ctx.moveTo(cx, cy - 13); ctx.lineTo(cx, cy - 5);
      ctx.stroke();
      // キラキラ
      const sp = Math.abs(Math.sin(m.t * 2));
      ctx.fillStyle = `rgba(255, 255, 200, ${0.4 + 0.6 * sp})`;
      ctx.fillRect(cx - 16, cy - 14, 2, 2);
      ctx.fillRect(cx + 14, cy - 10, 2, 2);
      ctx.fillRect(cx + 4, cy - 18, 2, 2);
      ctx.fillRect(cx - 6, cy + 6, 2, 2);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 30);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    if (state === 'dead') {
      drawDeadScene();
      return;
    }
    // 画面シェイク
    let sx = 0, sy = 0;
    if (shakeFrames > 0) {
      const k = shakeFrames / 18;
      sx = (Math.random() - 0.5) * shakeMag * k * 2;
      sy = (Math.random() - 0.5) * shakeMag * k * 2;
    }
    ctx.save();
    ctx.translate(sx, sy);
    drawBackground();
    drawGround();
    drawSpeedLines();
    drawFish();
    drawMatatabis();
    drawMagnets();
    drawHearts();
    drawObstacles();
    drawSpikes();
    drawPlayer();
    drawParticles();
    ctx.restore();
    if (state === 'paused') drawPauseOverlay();
  }

  function drawPauseOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 56px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('一時停止', VW/2, VH/2 - 16);
    ctx.font = '20px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('▶ ボタンで再開', VW/2, VH/2 + 24);
    ctx.textAlign = 'start';
  }

  // ---- ゲームオーバー演出 (鳥とヘビにいじめられる) ----
  function drawDeadScene() {
    // 暗めの夕焼け背景
    const g = ctx.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, '#1a0e2a');
    g.addColorStop(0.5, '#5a2a3a');
    g.addColorStop(1, '#8a3a3a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW, VH);

    // 月
    ctx.fillStyle = 'rgba(255, 230, 200, 0.85)';
    ctx.beginPath();
    ctx.arc(80, 110, 36, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(120, 60, 80, 0.5)';
    ctx.beginPath();
    ctx.arc(92, 102, 30, 0, Math.PI * 2);
    ctx.fill();

    // 地面
    ctx.fillStyle = '#1a0820';
    ctx.fillRect(0, GROUND_Y, VW, VH - GROUND_Y);
    ctx.fillStyle = '#ff8a7a';
    ctx.fillRect(0, GROUND_Y, VW, 3);

    const t = frame * 0.05;

    // ふらつく猫 (中央)
    const cat = CHARACTERS[selectedChar];
    const cx = VW / 2;
    const sway = Math.sin(t * 2) * 4;
    const catX = cx - cat.w / 2 + sway;
    const catY = GROUND_Y;
    drawCat(ctx, catX, catY, cat.w, cat.h, 0, true, cat, frame, true);

    // ぐるぐる目を上書き (頭の位置に)
    const headCx = catX + cat.w / 2;
    const headCy = catY - cat.h + cat.h * 0.2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(headCx - cat.w * 0.18, headCy, cat.w * 0.1, 0, Math.PI*2);
    ctx.arc(headCx + cat.w * 0.18, headCy, cat.w * 0.1, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.5;
    [-1, 1].forEach(side => {
      ctx.beginPath();
      const ex = headCx + side * cat.w * 0.18;
      for (let a = 0; a < Math.PI * 4; a += 0.3) {
        const r = 0.5 + a * 0.4;
        const px = ex + Math.cos(a) * r;
        const py = headCy + Math.sin(a) * r;
        if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    });

    // 苦しみマーク (キャラの上)
    ctx.fillStyle = '#ffd84d';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('×﹏×', headCx, catY - cat.h - 14 - Math.abs(Math.sin(t * 2)) * 4);
    ctx.textAlign = 'start';

    // ヘビ (左で煽る、舌を出す)
    const snakeWave = Math.sin(t * 2) * 3;
    ctx.fillStyle = '#4a8a3a';
    ctx.beginPath();
    ctx.ellipse(cx - 80, GROUND_Y - 12 + snakeWave, 36, 9, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#5aaa4a';
    ctx.beginPath();
    ctx.ellipse(cx - 50, GROUND_Y - 12 + snakeWave, 10, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffd84d';
    ctx.fillRect(cx - 46, GROUND_Y - 18 + snakeWave, 3, 3);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - 45, GROUND_Y - 17 + snakeWave, 1, 2);
    // 舌
    const tongueOut = (Math.floor(t * 3) % 4 < 2) ? 12 : 6;
    ctx.fillStyle = '#ff5e87';
    ctx.fillRect(cx - 40, GROUND_Y - 13 + snakeWave, tongueOut, 1.5);
    ctx.fillRect(cx - 40 + tongueOut, GROUND_Y - 14 + snakeWave, 3, 1.5);
    ctx.fillRect(cx - 40 + tongueOut, GROUND_Y - 12 + snakeWave, 3, 1.5);
    // ヘビの縞
    ctx.fillStyle = '#2a6a1a';
    for (let i = -100; i < -56; i += 10) {
      ctx.fillRect(cx + i, GROUND_Y - 18 + snakeWave, 3, 12);
    }

    // 鳥 (上空でつつく)
    const wing = Math.sin(t * 4) * 8;
    const bcx = cx + 30;
    const bcy = GROUND_Y - 70 + Math.sin(t * 1.5) * 6;
    // 翼 奥
    ctx.fillStyle = '#2c2c3a';
    ctx.beginPath();
    ctx.moveTo(bcx - 4, bcy);
    ctx.lineTo(bcx - 22, bcy - wing);
    ctx.lineTo(bcx - 8, bcy + 2);
    ctx.closePath();
    ctx.fill();
    // 体
    ctx.fillStyle = '#4a4a5a';
    ctx.beginPath();
    ctx.ellipse(bcx, bcy, 18, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#7a7a8a';
    ctx.beginPath();
    ctx.ellipse(bcx, bcy + 2, 14, 9, 0, 0, Math.PI*2);
    ctx.fill();
    // 翼 手前
    ctx.fillStyle = '#3a3a4a';
    ctx.beginPath();
    ctx.moveTo(bcx + 2, bcy);
    ctx.lineTo(bcx + 18, bcy - wing - 2);
    ctx.lineTo(bcx + 6, bcy + 4);
    ctx.closePath();
    ctx.fill();
    // くちばし (下向きに猫をつつく)
    const peck = Math.abs(Math.sin(t * 4)) * 8;
    ctx.fillStyle = '#ffaa3a';
    ctx.beginPath();
    ctx.moveTo(bcx - 4, bcy + 12);
    ctx.lineTo(bcx, bcy + 22 + peck);
    ctx.lineTo(bcx + 4, bcy + 12);
    ctx.closePath();
    ctx.fill();
    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bcx - 4, bcy - 2, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(bcx - 5, bcy - 2, 1.4, 0, Math.PI*2);
    ctx.fill();

    // 「ピヨピヨ」「シャー」吹き出し
    if (Math.floor(t) % 2 === 0) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('ピヨピヨ♪', bcx + 18, bcy - 18);
      ctx.fillText('シャー！', cx - 80, GROUND_Y - 30);
      ctx.textAlign = 'start';
    }

    // 漂う羽根
    for (let i = 0; i < 5; i++) {
      const fy = (frame * 0.7 + i * 60) % 200;
      const fx = cx + 50 + Math.sin(frame * 0.05 + i) * 30;
      ctx.fillStyle = `rgba(180,180,200,${0.6 - fy/300})`;
      ctx.fillRect(fx, GROUND_Y - 80 - fy, 4, 2);
    }
  }

  // ---- メインループ ----
  function loop() {
    if (state === 'playing') update();
    render();
    if (state === 'menu' || state === 'dead') renderCharPreviews();
    requestAnimationFrame(loop);
  }
  reset();
  render();
  requestAnimationFrame(loop);

  // 起動時の自動再生防止: 最初のタップで開始
  overlay.addEventListener('click', (e) => {
    if (e.target === startBtn) return;
    startGame();
  });
})();
</script>
</body>
